
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-POP & J-POP Idol Selection Game</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #a18cd1, #fbc2eb);
  text-align: center;
}

h1 {
  color: white;
  margin-top: 20px;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 20px;
  margin: 10px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.idol-img {
  width: 100%;
  border-radius: 15px;
}

.idol-name {
  font-size: 20px;
  font-weight: bold;
  margin-top: 10px;
}

.btn {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.like { background: #ff6b81; color: white; }
.skip { background: #74b9ff; color: white; }

.result {
  margin-top: 20px;
  color: white;
}
</style>
</head>
<body>

<h1>アイドル選択ゲーム</h1>
<div class="container">
  <div class="card" id="idolCard">
    <img id="idolImg" class="idol-img" src="">
    <div class="idol-name" id="idolName"></div>
  </div>

  <div>
    <button class="btn like" onclick="likeIdol()">好き！</button>
    <button class="btn skip" onclick="nextIdol()">スキップ</button>
  </div>

  <div class="result" id="result"></div>
</div>

<script>
const idols = [
  { name: "BTS ジョングク", img: "https://via.placeholder.com/400x300?text=Jungkook" },
  { name: "BLACKPINK リサ", img: "https://via.placeholder.com/400x300?text=Lisa" },
  { name: "TWICE モモ", img: "https://via.placeholder.com/400x300?text=Momo" },
  { name: "Stray Kids ヒョンジン", img: "https://via.placeholder.com/400x300?text=Hyunjin" },
  { name: "IVE ウォニョン", img: "https://via.placeholder.com/400x300?text=Wonyoung" },
  { name: "NewJeans ハニ", img: "https://via.placeholder.com/400x300?text=Hanni" },
  
  // JO1
  { name: "JO1 川西拓実", img: "https://via.placeholder.com/400x300?text=JO1+Takumi" },
  { name: "JO1 白岩瑠姫", img: "https://via.placeholder.com/400x300?text=JO1+Ruki" },
  { name: "JO1 河野純喜", img: "https://via.placeholder.com/400x300?text=JO1+Junki" },

  // INI
  { name: "INI 木村柾哉", img: "https://via.placeholder.com/400x300?text=INI+Masaya" },
  { name: "INI 西洸人", img: "https://via.placeholder.com/400x300?text=INI+Hiroto" },
  { name: "INI 田島将吾", img: "https://via.placeholder.com/400x300?text=INI+Shogo" }
];

let index = 0;
let liked = [];

function showIdol() {
  if(index >= idols.length) {
    document.getElementById("idolCard").style.display = "none";
    document.querySelector(".like").style.display = "none";
    document.querySelector(".skip").style.display = "none";
    document.getElementById("result").innerHTML =
      "あなたの推しは:<br>" + liked.join("<br>");
    return;
  }

  document.getElementById("idolName").textContent = idols[index].name;
  document.getElementById("idolImg").src = idols[index].img;
}

function likeIdol() {
  liked.push(idols[index].name);
  index++;
  showIdol();
}

function nextIdol() {
  index++;
  showIdol();
}

showIdol();
</script>

</body>
</html>
